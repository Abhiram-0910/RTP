version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mirai_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mirai_db
      POSTGRES_USER: mirai
      POSTGRES_PASSWORD: mirai_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
