version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mirai_postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: mirai_db
      POSTGRES_USER: mirai
      POSTGRES_PASSWORD: mirai_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirai -d mirai_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mirai_redis
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
